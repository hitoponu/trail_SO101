# SO101 デバイス設定
#
# 各自の環境に合わせて port と id を書き換えてください。
# ポートの調べ方:  python -m lerobot.scripts.lerobot_find_port

[leader]
port = "/dev/tty.usbmodem5A7A0176981"
id = "my_leader_arm"

[follower]
port = "/dev/tty.usbmodem58CD1766691"
id = "my_follower_arm"

# follower を記録ポーズへ動かすときの補間設定（急な動作を避けるため）
[motion]
move_duration = 2.0  # 移動にかける時間 [s]
move_fps = 30        # 補間の更新周波数 [Hz]

# カメラ設定 — capture_camera.py で使用
[camera]
index = 0      # カメラデバイスインデックス（lerobot-find-cameras で確認）
fps = 30
width = 1280
height = 720

# IK（逆運動学）設定 — record_and_move_ik.py で使用
[kinematics]
# URDF パス（相対パスはリポジトリのルート基準で解決される）
urdf_path = "SO101/so101_new_calib.urdf"
target_frame = "gripper_frame_link"  # エンドエフェクタのフレーム名
position_weight = 1.0                 # 位置拘束の重み
orientation_weight = 0.01             # 姿勢拘束の重み（0.0 で位置のみ拘束）
